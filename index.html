<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:'Barlow',sans-serif;min-height:100vh}
input,textarea,select,button{font-family:'Barlow',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}

/* ── PRINT STYLES ── */
@media print{
  #root{display:none!important}
  #print-view{display:block!important}
  @page{margin:15mm;size:A4}
}
#print-view{display:none}
.pv{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#000;padding:10px;max-width:780px;margin:0 auto}
.pv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;border-bottom:3px solid #1e3a5f;padding-bottom:12px}
.pv-title{font-size:20px;font-weight:700;color:#1e3a5f;letter-spacing:1px}
.pv-sub{font-size:12px;color:#374151;margin-top:2px}
.pv-badge{display:inline-block;padding:6px 18px;font-weight:700;font-size:13px;border-radius:4px;margin-top:8px}
.pv table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px}
.pv th{background:#1e3a5f;color:#fff;padding:7px 10px;text-align:left;font-size:11px}
.pv td{padding:6px 10px;border:1px solid #d1d5db;vertical-align:top}
.pv .lbl{background:#f3f4f6;font-weight:600;width:140px;color:#374151}
.pv .cat-row td{background:#e5e7eb;font-weight:700;font-size:11px}
.pv .status-pass{color:#16a34a;font-weight:700;text-align:center}
.pv .status-fail{color:#dc2626;font-weight:700;text-align:center}
.pv .status-na{color:#6b7280;font-weight:700;text-align:center}
.pv-footer{font-size:9px;color:#9ca3af;text-align:center;margin-top:12px;padding-top:8px;border-top:1px solid #d1d5db}
</style>
</head>

// ══════════════════════════════════════════
//  PRINT HTML GENERATOR  (Watercare template style)
// ══════════════════════════════════════════
function makePrintHTML({projectName,contractNo,valve,answers,checklist,userName,userCompany,signatureData,date,valveType,valveDetails,system,testEquip}){
  const isActuated = valveType==='actuated';
  const title  = isActuated ? 'CONTROL VALVE INSTALLATION' : 'VALVE and PENSTOCK INSTALLATION';
  const itrRef = isActuated ? 'I-02A' : 'M-01A';
  const cats   = [...new Set(checklist.map(i=>i.cat))];
  const hasSL  = Object.values(answers).some(a=>a&&a.status==='sl');
  const vd     = valveDetails || {};
  const mfr    = vd.make  || (valve.model||'').split('–')[0].trim();
  const mdl    = vd.model || ((valve.model||'').split('–').slice(1).join('–').trim() || valve.model || '');
  const sn     = vd.serialNo || '';
  const sys    = system || '';

  // Header field table rows
  const hdr = isActuated ? [
    ['Asset','',           'Project No.',contractNo],
    ['Location',valve.location||'', 'System',sys],
    ['Tag Number',valve.tag||'',    'Manufacturer',mfr],
    ['Layout Drawing','',           'Model',mdl],
    ['P&ID Drawing',valve.pid||'', 'Serial number',sn],
    ['Loop Drawing','',             'Data Sheet',''],
  ] : [
    ['Asset','',           'Project No.',contractNo],
    ['Location',valve.location||'', 'System',sys],
    ['Tag Number',valve.tag||'',    'Manufacturer',mfr],
    ['Layout Drawing','',           'Type and Model',`${valve.type||''} ${mdl}`.trim()],
    ['P&ID Drawing',valve.pid||'', 'Serial number',sn],
    ['ISO Drawing','',              'Data Sheet',''],
  ];

  const hl = `background:#f0f0f0;border:1px solid #999;padding:4px 8px;font-weight:600;font-size:11px;width:22%;color:#000`;
  const hv = `border:1px solid #999;padding:4px 8px;font-size:11px;width:28%;color:#000`;
  const hdrRows = hdr.map(([l1,v1,l2,v2])=>
    `<tr><td style="${hl}">${l1}</td><td style="${hv}">${v1}</td><td style="${hl}">${l2}</td><td style="${hv}">${v2}</td></tr>`
  ).join('');

  // Checklist rows with OK / N/A / S/L checkbox symbols
  const cb = (ans,s) => ans.status===s ? '&#9746;' : '&#9744;';
  const initials = (userName||'').split(/\s+/).map(w=>w[0]||'').join('').toUpperCase() || '–';
  const notePrefix = `Inspection Comment ${fmtDate(date)} ${initials}`;
  const checkRows = cats.map(cat=>{
    const items = checklist.filter(i=>i.cat===cat);
    const secHdr = cats.length>1
      ? `<tr style="background:#e0e0e0"><td></td><td colspan="4" style="padding:4px 8px;font-weight:700;font-size:11px;border:1px solid #999;color:#000">${cat}</td></tr>`
      : '';
    return secHdr + items.map((item,n)=>{
      const ans = answers[item.id]||{};
      const note = ans.note
        ? `<div style="font-size:9px;color:#333;margin-top:3px;font-style:italic"><span style="font-weight:700;font-style:normal">${notePrefix}:</span> ${ans.note}</div>`
        : '';
      return `<tr>
        <td style="width:28px;text-align:center;border:1px solid #999;padding:3px;font-size:10px;font-weight:600;vertical-align:top;padding-top:5px;color:#000">${n+1}</td>
        <td style="border:1px solid #999;padding:4px 8px;font-size:11px;line-height:1.4;vertical-align:top;color:#000">${item.text}${note}</td>
        <td style="width:36px;text-align:center;border:1px solid #999;font-size:14px;vertical-align:middle;color:#000">${cb(ans,'ok')}</td>
        <td style="width:36px;text-align:center;border:1px solid #999;font-size:14px;vertical-align:middle;color:#000">${cb(ans,'na')}</td>
        <td style="width:36px;text-align:center;border:1px solid #999;font-size:14px;vertical-align:middle;color:#000">${cb(ans,'sl')}</td>
      </tr>`;
    }).join('');
  }).join('');

  const so = `border:1px solid #999;padding:5px 8px;font-size:11px;color:#000`;
  return `
<div style="border:1.5px solid #333;max-width:800px;margin:0 auto;font-family:Arial,Helvetica,sans-serif;color:#000;background:#fff;font-size:11px">

  <!-- Title bar -->
  <table style="width:100%;border-collapse:collapse;border-bottom:1.5px solid #333">
    <tr>
      <td style="padding:8px 12px;font-size:18px;font-weight:700;letter-spacing:0.3px;color:#000;vertical-align:middle">${title}</td>
      <td style="padding:8px 12px;text-align:center;border-left:1.5px solid #333;font-size:20px;font-weight:700;white-space:nowrap;width:100px;color:#000;vertical-align:middle">${itrRef}</td>
    </tr>
  </table>

  <!-- Asset / header fields -->
  <table style="width:100%;border-collapse:collapse;border-bottom:1px solid #999">${hdrRows}</table>

  <!-- Checklist column headers -->
  <table style="width:100%;border-collapse:collapse">
    <thead>
      <tr style="background:#e0e0e0">
        <th style="width:30px;border:1px solid #999;padding:4px 2px;font-size:10px;color:#000;text-align:center"></th>

}

function App(){
  const [screen,setScreen]     = useState('landing');
  // Admin — seeded from embedded config if admin has exported a configured app

  const [schedule,setSchedule]       = useState(CFG.schedule     || SAMPLE_SCHEDULE);

  const [adminTab,setAdminTab]       = useState('schedule');
  const [dragOver,setDragOver]         = useState(false);
  const [importMsg,setImportMsg]       = useState(null);
  const fileInputRef                   = useRef(null);
  // P&ID register
  const [pidDescriptions,setPidDescriptions] = useState(CFG.pidDescriptions || DEFAULT_PID_DESCRIPTIONS); /*PID_DESC*/
  const [pidDragOver,setPidDragOver]   = useState(false);
  const [pidRegMsg,setPidRegMsg]       = useState(null);
  const [pidProcessing,setPidProcessing] = useState(false);
  const pidFileRef                     = useRef(null);
  // QR hosted URL
  const [hostedUrl,setHostedUrl]       = useState('');
  // Expanded comment fields on ITR items
  const [expandedNotes,setExpandedNotes] = useState({});
  // Google Sheets integration
  const [scriptUrl,setScriptUrl]       = useState(CFG.scriptUrl || '');
  const [gsRecords,setGsRecords]       = useState(null);   // null=not fetched, []+ = loaded
  const [gsSchedule,setGsSchedule]     = useState(null);   // schedule rows from sheet
  const [gsLoading,setGsLoading]       = useState(false);
  const [gsError,setGsError]           = useState('');
  const [gsLastFetch,setGsLastFetch]   = useState('');
  const [filterPID,setFilterPID]       = useState('');
  const [reprinting,setReprinting]     = useState('');     // tag currently being reprinted
  const [submitted,setSubmitted]       = useState(false);
  const [submitErr,setSubmitErr]       = useState('');
  // User flow
  const [userName,setUserName]     = useState('');
  const [userCompany,setUserCompany] = useState('');
  const [selPID,setSelPID]         = useState('');
  const [selValve,setSelValve]     = useState(null);
  const [answers,setAnswers]       = useState({});
  const [sigData,setSigData]       = useState(null);
  const [itrDate]                  = useState(new Date());
  // Sig canvas
  const canvasRef = useRef(null);
  const drawing   = useRef(false);
  const lastPt    = useRef(null);

  const [valveType,setValveType]     = useState(''); // 'manual' | 'actuated'
  const [valveDetails,setValveDetails] = useState({make:'',model:'',serialNo:''});
  const [testEquip,setTestEquip]     = useState({make:'',model:'',serialNo:'',calExpiry:''}); // actuated only
  const [generating,setGenerating]   = useState(false);

  const pids          = [...new Set(schedule.map(v=>v.pid))].sort();
  const pidValves     = schedule.filter(v=>v.pid===selPID);
  const activeChecklist = valveType==='actuated' ? actuatedChecklist : manualChecklist;
  const cats          = [...new Set(activeChecklist.map(i=>i.cat))];
  const totalItems    = activeChecklist.length;
  const doneItems     = Object.values(answers).filter(a=>a&&a.status).length;
  const progress      = totalItems ? Math.round(doneItems/totalItems*100) : 0;
  const allDone       = doneItems===totalItems;
  const hasSL         = Object.values(answers).some(a=>a&&a.status==='sl');
  const slItems       = activeChecklist.filter(i=>answers[i.id]&&answers[i.id].status==='sl');

  const setStatus = (id,s) => setAnswers(p=>({...p,[id]:{...(p[id]||{}),status:p[id]?.status===s?null:s}}));
  const setNote   = (id,n) => setAnswers(p=>({...p,[id]:{...(p[id]||{}),note:n}}));

  // Signature
  const getPos = (e) => {
    const c = canvasRef.current, r = c.getBoundingClientRect();
    const sx = c.width/r.width, sy = c.height/r.height;
    const src = e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  };
  const sigStart = (e) => { e.preventDefault(); drawing.current=true; lastPt.current=getPos(e); };
  const sigMove  = (e) => {
    e.preventDefault(); if(!drawing.current||!canvasRef.current) return;
    const c=canvasRef.current, ctx=c.getContext('2d'), pt=getPos(e);
    ctx.beginPath(); ctx.moveTo(lastPt.current.x,lastPt.current.y);
    ctx.lineTo(pt.x,pt.y); ctx.strokeStyle='#0f172a';
    ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    lastPt.current=pt;
  };
  const sigEnd = (e) => {
    e.preventDefault(); drawing.current=false;
    if(canvasRef.current) setSigData(canvasRef.current.toDataURL());
  };
  const clearSig = () => {
    const c=canvasRef.current;
    if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); setSigData(null); }
  };

  // ── ITR PDF GENERATION ──
  // Uses html2canvas to render the ITR template then jsPDF to create a real PDF.
  const generatePDFBlob = async () => {
    if(!window.html2canvas || !window.jspdf){
      alert('PDF libraries not loaded – check your internet connection and reload.');
      return null;
    }
    setGenerating(true);
    try {
      const bodyHtml = makePrintHTML({
        projectName,contractNo,valve:selValve,answers,checklist:activeChecklist,
        userName,userCompany,signatureData:sigData,date:itrDate,valveType,valveDetails,
        system: pidDescriptions[selValve?.pid] || '',
        testEquip,
      });

      // Mount hidden 800px container with page margins
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;left:-9999px;top:0;width:840px;background:#fff;color:#000;font-family:Arial,Helvetica,sans-serif;padding:20px 18px';
      el.innerHTML = bodyHtml;
      document.body.appendChild(el);

      const canvas = await window.html2canvas(el, {
        scale: 2,            // 2× for crisp text
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
        width: 840,
      });
      document.body.removeChild(el);

      // Build PDF – add pages as needed for long checklists
      const {jsPDF} = window.jspdf;
      const pdf     = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
      const pageW   = pdf.internal.pageSize.getWidth();   // 210 mm
      const pageH   = pdf.internal.pageSize.getHeight();  // 297 mm
      const imgData = canvas.toDataURL('image/png');
      const imgH    = canvas.height * pageW / canvas.width;

      let drawn = 0;
      while(drawn < imgH){
        if(drawn > 0) pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, -drawn, pageW, imgH);
        drawn += pageH;
      }

      return pdf.output('blob');
    } catch(err){
      console.error('PDF error:', err);
      alert('PDF generation failed – please try again.');
      return null;
    } finally {
      setGenerating(false);
    }
  };

  // Opens the PDF in a new browser tab (user can save from there)
  const viewITR = async () => {
    const blob = await generatePDFBlob();
    if(!blob) return;
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(()=>URL.revokeObjectURL(url), 120000);
  };

  // Sends the PDF as a file attachment.
  // Mobile: native share sheet (email, WhatsApp, etc.) with PDF attached.
  // Desktop: downloads PDF + opens pre-filled mailto.
  const sendITR = async () => {
    const blob = await generatePDFBlob();
    if(!blob) return;
    const tag      = (selValve?.tag||'').replace(/[^A-Z0-9\-]/gi,'_');
    const itrRef   = valveType==='actuated'?'I-02A':'M-01A';
    const fileName = `${itrRef}-${tag}-${fmtDate(itrDate).replace(/\//g,'-')}.pdf`;
    const file     = new File([blob], fileName, {type:'application/pdf'});

    // ── Native share with PDF (iOS / Android) ──
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      try {
        await navigator.share({
          title: `${itrRef} – ${selValve?.tag} | ${projectName}`,
          text:  `ITR completed.\nValve: ${selValve?.tag}  Result: ${hasSL?'S/L Items Noted':'Accepted'}\nInspector: ${userName} · ${userCompany}`,
          files: [file],
        });
        submitRecord();
        setScreen('complete');
        return;
      } catch(err){
        if(err.name==='AbortError') return;
      }
    }

    // ── Desktop fallback: download PDF + open mailto ──
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);

    const subj = encodeURIComponent(`${itrRef} Completed – ${selValve?.tag} | ${projectName}`);
    const body = encodeURIComponent([
      'ITR COMPLETION NOTIFICATION','',
      `Project:      ${projectName}`,
      `Contract No:  ${contractNo}`,'',
      `ITR Form:     ${itrRef}`,
      `Valve Tag:    ${selValve?.tag}`,
      `P&ID Ref:     ${selValve?.pid}`,'',
      `Inspector:    ${userName}`,
      `Company:      ${userCompany}`,
      `Date:         ${fmtDate(itrDate)}`,'',
      `Result:       ${hasSL?'S/L Items Noted – follow-up required':'ACCEPTED'}`,'',
      `The ITR PDF has been saved as "${fileName}".`,
      `Please attach it to this email before sending.`,
    ].join('\n'));
    window.open(`mailto:${adminEmail}?subject=${subj}&body=${body}`);
    submitRecord(); // record to Google Sheets
    setScreen('complete');
  };

  const importExcel = (file) => {
    if(!file) return;
    setImportMsg({type:'info',text:`Reading "${file.name}"…`});
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = window.XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        // ── Try to find the real header row by looking for "CONCATENATE" ──
        const raw = window.XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        const hdrIdx = raw.findIndex(row =>
          row.some(c => String(c).toUpperCase().trim() === 'CONCATENATE')
        );

        if(hdrIdx !== -1){
          // ── MTL-style schedule (multi-row header) ──
          const hdrs = raw[hdrIdx].map(h => String(h).trim().toUpperCase());
          const ci = name => hdrs.findIndex(h => h === name);
          // Column indices
          const iTag  = ci('CONCATENATE');
          const iPid  = ci('P&ID DWG');
          const iType = ci('TYPE');
          const iSize = ci('SIZE (DN)');
          const iConn = ci('CONNECTION');
          const iBmat = ci('BODY MATERIAL');
          const iTmat = ci('TRIM MATERIAL');
          const iMake = ci('MAKE');
          const iMdl  = ci('MODEL');
          const iLoc  = ci('EQUIPMENT LOCATION');
          const iFn   = ci('EQUIPMENT FUNCTION');
          const iOp   = ci('OPERATOR');
          const iArea = ci('PROCESS AREA');

          const get = (row, i) => i >= 0 ? String(row[i]||'').trim() : '';
          const fmtPid = v => {
            if(!v && v !== 0) return '';
            if(typeof v === 'number') return v.toFixed(3);
            return String(v).trim();
          };

          const rows = raw.slice(hdrIdx+1)
            .filter(row => {
              const tag = get(row, iTag);
              return tag && tag.includes('-') && tag.length > 5;
            })
            .map(row => ({
              tag:      get(row, iTag),
              pid:      fmtPid(iTag >= 0 ? row[iPid] : ''),
              type:     get(row, iType),
              size:     get(row, iSize) ? `DN${get(row,iSize)}` : '',
              rating:   get(row, iConn),
              material: [get(row,iBmat), get(row,iTmat)].filter(Boolean).join(' / '),
              model:    [get(row,iMake), get(row,iMdl)].filter(s=>s&&s!=='TBA'&&s!=='-').join(' – '),
              location: [get(row,iArea), get(row,iLoc)].filter(Boolean).join(' · '),
              operator: get(row, iOp),
              function: get(row, iFn),
            }));

          if(!rows.length){setImportMsg({type:'error',text:'Headers found but no valve rows detected. Check the CONCATENATE column has data.'});return;}
          setSchedule(rows);
          setImportMsg({type:'success',text:`✓ ${rows.length} valves loaded from "${file.name}" (${wb.SheetNames[0]})`});

        } else {
          // ── Generic fallback: first row as headers ──
          const data = window.XLSX.utils.sheet_to_json(ws, {defval:''});
          if(!data.length){setImportMsg({type:'error',text:'Sheet appears empty.'});return;}
          const norm = s => String(s||'').trim().toLowerCase().replace(/[^a-z]/g,'');
          const findKey = (row,t) => Object.keys(row).find(k=>norm(k)===norm(t)||norm(k).startsWith(norm(t).slice(0,4)))||null;
          const rows = data.map(row=>({
            tag:      String(row[findKey(row,'tag')]||row[findKey(row,'concatenate')]||'').trim(),
            pid:      String(row[findKey(row,'pid')]||row[findKey(row,'pandid')]||'').trim(),
            type:     String(row[findKey(row,'type')]||'').trim(),
            size:     String(row[findKey(row,'size')]||'').trim(),
            rating:   String(row[findKey(row,'rating')]||row[findKey(row,'connection')]||'').trim(),
            material: String(row[findKey(row,'material')]||row[findKey(row,'body')]||'').trim(),
            model:    String(row[findKey(row,'model')]||row[findKey(row,'make')]||'').trim(),
            location: String(row[findKey(row,'location')]||'').trim(),
            operator: String(row[findKey(row,'operator')]||'').trim(),
          })).filter(v=>v.tag);
          if(!rows.length){setImportMsg({type:'error',text:'No valves found. Ensure the sheet has a Tag or Concatenate column.'});return;}
          setSchedule(rows);
          setImportMsg({type:'success',text:`✓ ${rows.length} valves loaded from "${file.name}"`});
        }
      } catch(err){
        setImportMsg({type:'error',text:`Could not read file: ${err.message}`});
      }
    };
    reader.onerror = ()=>setImportMsg({type:'error',text:'File read failed – please try again.'});
    reader.readAsBinaryString(file);
  };

  // Toggle comment field on any checklist item
  const toggleNote = (id) => setExpandedNotes(prev=>({...prev,[id]:!prev[id]}));

  // ── P&ID IMPORT: dispatcher ──
  const handlePIDFiles = (files) => {
    const arr = Array.from(files);
    const pdfs   = arr.filter(f => f.name.toLowerCase().endsWith('.pdf'));
    const excels = arr.filter(f => /\.(xlsx|xls)$/i.test(f.name));
    if (pdfs.length)   importPIDFromPDF(pdfs);
    if (excels.length) importPIDFromExcel(excels[0]);
  };

  // ── P&ID IMPORT: read drawing number + description from PDF title block ──
  const importPIDFromPDF = async (files) => {
    const pdfjsLib = window.pdfjsLib;
    if (!pdfjsLib) { setPidRegMsg({type:'error',text:'PDF library not loaded — check internet connection.'}); return; }
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    setPidProcessing(true);
    setPidRegMsg({type:'info', text:`Reading ${files.length} P&ID drawing${files.length>1?'s':''}…`});

    const map = {};
    let ok = 0, fail = 0, failNames = [];

    for (const file of files) {
      try {
        const buf  = await file.arrayBuffer();
        const pdf  = await pdfjsLib.getDocument({data: buf}).promise;
        const page = await pdf.getPage(1);
        const tc   = await page.getTextContent();

        // Join all text items into one searchable string
        const allText = tc.items.map(i => i.str).join(' ');

        // ── Drawing number: MTL format 7-8 digits . 3 digits ──
        // e.g. 2014978.013
        const dwnMatch = allText.match(/\b(\d{7,8}\.\d{3})\b/);
        if (!dwnMatch) { fail++; failNames.push(file.name); continue; }
        const dwgNo = dwnMatch[1];

        // ── Description: extract from title block ──
        // Title line format: "PIPING AND INSTRUMENTATION DIAGRAM – AEROBIC TANK 1"
        // Regex captures everything after the em-dash/hyphen up to multiple spaces
        // or a known title-block keyword
        let description = '';
        const diagMatch = allText.match(
          /INSTRUMENTATION\s+DIAGRAM\s*[–\-—]+\s*([A-Z][A-Z0-9 ,&\/]+?)(?:\s{2,}|(?:DWG|REF|CAD|CONTRACT|DATE|SCALE|ISSUE|PRELIMINARY|NOT FOR)\b)/
        );
        if (diagMatch) {
          description = diagMatch[1].trim();
          // Convert ALL CAPS → Title Case
          description = description.toLowerCase()
            .replace(/\b\w/g, c => c.toUpperCase())
            .replace(/\b(And|Or|Of|The|In|At|For|To|With)\b/g, m => m.toLowerCase())
            .replace(/\s+/g, ' ').trim();
        }

        // Fallback: clean up filename
        if (!description) {
          description = file.name.replace(/\.pdf$/i,'').replace(/[_\-]/g,' ').trim();
        }

        map[dwgNo] = description;
        ok++;
      } catch(err) {
        fail++;
        failNames.push(file.name);
      }
    }

    setPidProcessing(false);
    if (!ok) {
      setPidRegMsg({type:'error', text:`No drawing numbers found. Confirm files use the MTL title block format (DWG No. field).`});
      return;
    }
    setPidDescriptions(prev => ({...prev, ...map}));
    setPidRegMsg({
      type:'success',
      text:`✓ ${ok} P&ID${ok>1?'s':''} read${fail>0?` · ${fail} skipped (no DWG No. found): ${failNames.join(', ')}`:''}`,
    });
  };

  // ── P&ID IMPORT: read from Excel drawing register ──
  const importPIDFromExcel = (file) => {
    if(!file) return;
    setPidRegMsg({type:'info',text:`Reading "${file.name}"…`});
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = window.XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = window.XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        const norm = s => String(s||'').trim().toLowerCase();
        const hdrIdx = raw.findIndex(row =>
          row.some(c => ['number','drawing','p&id','pid','dwg','ref'].some(k=>norm(c).includes(k)))
        );
        const hdrs    = hdrIdx >= 0 ? raw[hdrIdx].map(h=>norm(h)) : [];
        const numCol  = hdrs.findIndex(h=>['number','drawing','dwg','pid','p&id','ref'].some(k=>h.includes(k)));
        const descCol = hdrs.findIndex(h=>['desc','title','name','area','system','sheet'].some(k=>h.includes(k)));
        const map = {};
        raw.slice(hdrIdx >= 0 ? hdrIdx+1 : 0).forEach(row => {
          const num  = String(row[numCol >= 0 ? numCol : 0]||'').trim();
          const desc = String(row[descCol >= 0 ? descCol : 1]||'').trim();
          if(num && desc) {
            const normNum = isNaN(Number(num)) ? num : Number(num).toFixed(3);
            map[normNum] = desc;
          }
        });
        const count = Object.keys(map).length;
        if(!count){setPidRegMsg({type:'error',text:'No entries found. Check the file has a Number and Description column.'});return;}
        setPidDescriptions(prev=>({...prev,...map}));
        setPidRegMsg({type:'success',text:`✓ ${count} P&ID descriptions loaded from "${file.name}"`});
      } catch(err){ setPidRegMsg({type:'error',text:`Could not read file: ${err.message}`}); }
    };
    reader.onerror = ()=>setPidRegMsg({type:'error',text:'File read failed.'});
    reader.readAsBinaryString(file);
  };

    const a = document.createElement('a');

      pid:          selValve?.pid || '',
      valveTypeName:selValve?.type || '',
      size:         selValve?.size || '',
      material:     selValve?.material || '',

      const itrType   = String(rec['ITR Type']||'').includes('I-02') ? 'actuated' : 'manual';

      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;left:-9999px;top:0;width:840px;background:#fff;color:#000;font-family:Arial,Helvetica,sans-serif;padding:20px 18px';
      el.innerHTML = bodyHtml;
      document.body.appendChild(el);

      const canvas = await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,width:840});
      document.body.removeChild(el);

      const {jsPDF} = window.jspdf;
      const pdf   = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgData = canvas.toDataURL('image/png');
      const imgH    = canvas.height * pageW / canvas.width;
      let drawn = 0;
      while(drawn<imgH){ if(drawn>0) pdf.addPage(); pdf.addImage(imgData,'PNG',0,-drawn,pageW,imgH); drawn+=pageH; }
      pdf.save(`REPRINT-${rec['ITR Type']||'ITR'}-${tag.replace(/[^A-Z0-9\-]/gi,'_')}.pdf`);
    } catch(err){
      alert('Reprint failed: '+err.message);

                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:'#f1f5f9'}}>
                      {filterPID||'Overall'} Progress
                    </div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:'#F59E0B'}}>{pct}%</div>
                  </div>
                  <ProgressBar value={pct}/>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:14}}>
                    {[{l:'Completed',v:completed,c:'#16a34a'},{l:'Not Started',v:notStarted,c:'#334155'},{l:'S/L Items',v:sl,c:'#b45309'}].map(m=>(
                      <div key={m.l} style={{textAlign:'center'}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:700,color:m.c}}>{m.v}</div>
                        <div style={{fontSize:11,color:'#64748b'}}>{m.l}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* P&ID breakdown */}
                {!filterPID&&(
                  <div style={{...T.card,marginBottom:16}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:'#f1f5f9',marginBottom:12}}>P&ID Breakdown</div>
                    {pidList.map(pid=>{
                      const pidValvesAll = allValves.filter(v=>v.pid===pid);
                      const pidDone = pidValvesAll.filter(v=>String(compMap[v.tag]?.['Completed']||'').toUpperCase()==='Y').length;
                      const pidPct  = pidValvesAll.length>0?Math.round(pidDone/pidValvesAll.length*100):0;
                      return (
                        <div key={pid} style={{display:'flex',alignItems:'center',gap:12,padding:'7px 0',borderTop:'1px solid #334155'}}>
                          <button onClick={()=>setFilterPID(pid)} style={{...T.mono,fontSize:13,color:'#F59E0B',background:'transparent',border:'none',cursor:'pointer',minWidth:100,textAlign:'left'}}>{pid}</button>
                          <div style={{flex:1}}><ProgressBar value={pidPct}/></div>
                          <div style={{fontSize:12,color:'#94a3b8',minWidth:60,textAlign:'right'}}>{pidDone}/{pidValvesAll.length}</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Valve table */}
                <div style={{overflowX:'auto',borderRadius:10,border:'1.5px solid #334155'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr style={{background:'#1e293b'}}>
                        {['Tag','P&ID','Type / Size','Status','Inspector','Date','Result',''].map(h=>(
                          <th key={h} style={{padding:'9px 10px',textAlign:'left',color:'#94a3b8',fontWeight:600,fontSize:11,borderBottom:'1.5px solid #334155',whiteSpace:'nowrap'}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((v,i)=>{
                        const cr = compMap[v.tag];
                        const done = String(cr?.['Completed']||'').toUpperCase()==='Y';
                        const rr = reprintMap[v.tag];
                        const result = cr?.['Result']||'';
                        const isSL = result.includes('S/L');
                        return (
                          <tr key={v.tag} style={{borderBottom:'1px solid #1e293b',background:done?(isSL?'#1c0a00':'#051a0e'):'#0f172a'}}>
                            <td style={{padding:'8px 10px',...T.mono,color:'#F59E0B',fontSize:11}}>{v.tag}</td>
                            <td style={{padding:'8px 10px',color:'#94a3b8',fontSize:11}}>{v.pid}</td>
                            <td style={{padding:'8px 10px',color:'#cbd5e1'}}>{v.type}{v.size?` ${v.size}`:''}</td>
                            <td style={{padding:'8px 10px'}}>
                              {done
                                ? <span style={{background:isSL?'#b45309':'#16a34a',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:4}}>
                                    {isSL?'S/L':'COMPLETE'}
                                  </span>
                                : <span style={{color:'#334155',fontSize:11}}>Not started</span>}
                            </td>
                            <td style={{padding:'8px 10px',color:'#94a3b8',fontSize:11}}>{cr?.['Inspector']||'–'}</td>
                            <td style={{padding:'8px 10px',color:'#94a3b8',fontSize:11,whiteSpace:'nowrap'}}>{cr?.['Date Completed']||'–'}</td>
                            <td style={{padding:'8px 10px',color:isSL?'#fcd34d':'#86efac',fontSize:11}}>{done?result:'–'}</td>
                            <td style={{padding:'6px 8px'}}>
                              {done&&rr&&(
                                <button onClick={()=>reprintValve(rr)} disabled={reprinting===v.tag}
                                  style={{...T.btnG,fontSize:11,padding:'5px 10px',whiteSpace:'nowrap',opacity:reprinting===v.tag?0.5:1}}>
                                  {reprinting===v.tag?'⏳':'🖨'} Reprint
                                </button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                {filterPID&&<button onClick={()=>setFilterPID('')} style={{...T.btnG,fontSize:12,marginTop:10,padding:'7px 14px'}}>Show All P&IDs</button>}
              </div>
            );
          })()}

          {adminTab==='settings'&&(
            <div>
              <div style={{...T.h2,marginBottom:20}}>Project Settings</div>
              <div style={T.card}>
                {[{lbl:'Project Name',val:projectName,set:setProjectName,type:'text'},
                  {lbl:'Contract Number',val:contractNo,set:setContractNo,type:'text'},
                  {lbl:'Report Email Address(es)',val:adminEmail,set:setAdminEmail,type:'text'},
                  {lbl:'Google Script URL',val:scriptUrl,set:setScriptUrl,type:'url'}].map(f=>(
                  <div key={f.lbl} style={{marginBottom:22}}>
                    <label style={T.label}>{f.lbl}</label>
                    <input type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} style={{...T.input,fontSize:16,padding:'13px 14px'}}/>
                  </div>
                ))}
              </div>

              {/* Export card */}
              <div style={{...T.card,border:'1.5px solid #F59E0B'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:'#F59E0B',marginBottom:6}}>Export Configured App</div>
                <div style={{fontSize:13,color:'#94a3b8',marginBottom:6,lineHeight:1.6}}>
                  Once you have loaded the valve schedule, ITR checklist and P&ID drawings, click below to download a new version of the app with all of that data built in.
                </div>
                <div style={{fontSize:13,color:'#64748b',marginBottom:16,lineHeight:1.6}}>
                  Replace the file on your server with this exported version — every worker who opens the app will see the pre-loaded schedule and settings from the start, with no need to re-upload anything.
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
                  {[
                    {l:'Valves loaded',v:schedule.length,ok:schedule!==SAMPLE_SCHEDULE},
                    {l:'Manual items',v:manualChecklist.length,ok:true},
                    {l:'Actuated items',v:actuatedChecklist.length,ok:true},
                  ].map(m=>(
                    <div key={m.l} style={{background:'#0f172a',borderRadius:6,padding:'10px 12px',textAlign:'center'}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,color:m.ok&&m.v>0?'#F59E0B':'#334155'}}>{m.v}</div>
                      <div style={{fontSize:11,color:'#64748b'}}>{m.l}</div>
                    </div>
                  ))}
                </div>
                <button onClick={exportConfiguredApp} style={{...T.btnP,width:'100%',fontSize:16,padding:'14px',borderRadius:8}}>
                  ⬇ Download Configured App
                </button>
              </div>
            </div>
          )}

          {/* ── QR Code tab ── */}
          {adminTab==='qr'&&(
            <div>
              <div style={T.card}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:6}}>Hosted App URL</div>
                <div style={{fontSize:13,color:'#64748b',marginBottom:16,lineHeight:1.6}}>
                  For the QR code to work on a mobile device the app must be hosted on a web server.<br/>
                  Once hosted, paste the URL here and the QR code will update automatically.
                </div>
                <label style={T.label}>Hosted URL</label>
                <input value={hostedUrl} onChange={e=>setHostedUrl(e.target.value)}
                  placeholder="https://your-server.com/valve-itr-app.html"
                  style={{...T.input,fontSize:14,marginBottom:12}}/>
                {isLocal&&(
                  <div style={{padding:'10px 14px',borderRadius:6,fontSize:13,background:'#451a03',border:'1px solid #b45309',color:'#fcd34d',lineHeight:1.6}}>
                    ⚠️ No hosted URL entered — paste your URL above after uploading the file to a web server.<br/>
                    <span style={{fontSize:11,color:'#d97706',marginTop:4,display:'block'}}>
                      Quickest option: drag the HTML file to <strong>netlify.com/drop</strong> — gives a live https:// link in ~30 seconds, no account needed.
                    </span>
                  </div>
                )}
              </div>
              <div style={{textAlign:'center',marginTop:24}}>
                <div style={{fontSize:13,color:'#64748b',marginBottom:20}}>
                  {isLocal?'Enter a hosted URL above to generate a working QR code':`Scans to: ${qrTarget}`}
                </div>
                <div style={{background:'#fff',borderRadius:16,padding:24,display:'inline-block',marginBottom:20,border:`4px solid ${isLocal?'#475569':'#F59E0B'}`}}>
                  <img src={qrImg} alt="QR Code" width={280} height={280} style={{display:'block',opacity:isLocal?0.4:1}}/>
                </div>
                <div style={{...T.card,maxWidth:480,margin:'0 auto 20px',textAlign:'left'}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:'#F59E0B',marginBottom:6}}>VALVE INSTALLATION ITR</div>
                  <div style={{fontSize:14,color:'#94a3b8'}}>{projectName}</div>
                  <div style={{fontSize:12,color:'#475569',marginTop:2}}>{contractNo}</div>
                  <div style={{marginTop:10,fontSize:11,color:'#334155',...T.mono,wordBreak:'break-all',lineHeight:1.5}}>{qrTarget}</div>
                </div>
                <button onClick={()=>window.print()} style={{...T.btnS,opacity:isLocal?0.5:1}}>🖨 Print QR Code</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── USER SETUP ────────────────────────────
  if(screen==='user-setup') return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="Inspector Details" onBack={()=>setScreen('landing')} step={1} total={6}/>
      <div style={{maxWidth:500,margin:'0 auto',padding:'48px 24px'}}>
        <div style={{marginBottom:28}}>
          <label style={T.label}>Your Full Name</label>
          <input value={userName} onChange={e=>setUserName(e.target.value)} placeholder="e.g. John Smith" style={{...T.input,fontSize:17,padding:'14px 16px'}}/>
        </div>
        <div style={{marginBottom:40}}>
          <label style={T.label}>Company / Contractor</label>
          <input value={userCompany} onChange={e=>setUserCompany(e.target.value)} placeholder="e.g. ABC Mechanical Services" style={{...T.input,fontSize:17,padding:'14px 16px'}}/>
        </div>
        <button onClick={()=>{if(userName&&userCompany)setScreen('pid-select');}} disabled={!userName||!userCompany}
          style={{...T.btnP,width:'100%',opacity:(!userName||!userCompany)?0.4:1,fontSize:17,padding:'16px',borderRadius:10}}>
          Continue →
        </button>
      </div>
    </div>
  );

  // ── P&ID SELECT ───────────────────────────
  if(screen==='pid-select') return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="Select P&ID Reference" onBack={()=>setScreen('user-setup')} step={2} total={6} sub={`Logged in as ${userName} · ${userCompany}`}/>
      <div style={{maxWidth:700,margin:'0 auto',padding:'32px 20px'}}>
        <div style={{fontSize:14,color:'#64748b',marginBottom:24}}>Select the P&ID for the valve you are currently installing.</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {pids.map(pid=>{
            const cnt  = schedule.filter(v=>v.pid===pid).length;
            const desc = pidDescriptions[pid] || '';
            return (
              <button key={pid} onClick={()=>{setSelPID(pid);setScreen('valve-select');}}
                style={{background:'#1e293b',border:'2px solid #334155',borderRadius:12,padding:'18px 22px',cursor:'pointer',textAlign:'left',transition:'border-color 0.15s',width:'100%'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#F59E0B';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#334155';}}>
                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <div style={{flex:1}}>
                    <div style={{...T.mono,fontSize:18,fontWeight:500,color:'#F59E0B'}}>{pid}</div>
                    {desc
                      ? <div style={{fontSize:14,color:'#e2e8f0',marginTop:4,fontWeight:500}}>{desc}</div>
                      : <div style={{fontSize:12,color:'#475569',marginTop:4,fontStyle:'italic'}}>No description loaded — upload drawing register in Admin</div>
                    }
                    <div style={{fontSize:12,color:'#64748b',marginTop:6}}>{cnt} valve{cnt!==1?'s':''}</div>
                  </div>
                  <div style={{fontSize:24,color:'#334155',flexShrink:0}}>›</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );

  // ── VALVE SELECT ──────────────────────────
  if(screen==='valve-select') return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title={`Valves on ${selPID}`} onBack={()=>setScreen('pid-select')} step={3} total={6}/>
      <div style={{maxWidth:700,margin:'0 auto',padding:'24px 20px'}}>
        <div style={{fontSize:14,color:'#64748b',marginBottom:20}}>Select the valve tag you are inspecting.</div>
        {pidValves.map(v=>(
          <button key={v.tag} onClick={()=>{setSelValve(v);setAnswers({});setSigData(null);setExpandedNotes({});setScreen('valve-type');}}
            style={{width:'100%',background:'#1e293b',border:'1.5px solid #334155',borderRadius:10,padding:'16px 20px',cursor:'pointer',textAlign:'left',marginBottom:10,transition:'border-color 0.15s',display:'block'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#F59E0B';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#334155';}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
              <div style={{...T.mono,fontSize:13,fontWeight:500,color:'#F59E0B',minWidth:160,paddingTop:2,wordBreak:'break-all'}}>{v.tag}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:'#f1f5f9'}}>{v.type}{v.size?` — ${v.size}`:''}</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:3}}>{v.location}</div>
                {v.function&&<div style={{fontSize:11,color:'#475569',marginTop:2}}>{v.function}</div>}
              </div>
              <div style={{fontSize:22,color:'#334155',flexShrink:0}}>›</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );

  // ── VALVE TYPE SELECTION ──────────────────
  if(screen==='valve-type'&&selValve) {
    const goToDetails = (type) => {
      setValveType(type);
      // Pre-populate from schedule; split "Make – Model" if separator present
      const raw = selValve.model || '';
      const parts = raw.split('–').map(s=>s.trim());
      setValveDetails({
        make:     parts[0] || '',
        model:    parts.length > 1 ? parts.slice(1).join(' – ') : '',
        serialNo: '',
      });
      setScreen('valve-details');
    };
    return (
      <div style={{minHeight:'100vh',background:'#0f172a'}}>
        <Header title="Select Valve Type" onBack={()=>setScreen('valve-select')} step={4} total={7}/>
        <div style={{maxWidth:520,margin:'0 auto',padding:'40px 24px'}}>
          <div style={{marginBottom:24}}>
            <div style={{...T.mono,fontSize:18,color:'#F59E0B'}}>{selValve.tag}</div>
            <div style={{fontSize:14,color:'#64748b',marginTop:4}}>{selValve.type}{selValve.size?` — ${selValve.size}`:''}</div>
            <div style={{fontSize:13,color:'#475569',marginTop:16}}>Which ITR checklist applies to this valve?</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <button onClick={()=>goToDetails('manual')}
              style={{background:'#1e293b',border:'2px solid #334155',borderRadius:12,padding:'20px 22px',cursor:'pointer',textAlign:'left',width:'100%'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#F59E0B';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#334155';}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Manual Valve</div>
              <div style={{fontSize:13,color:'#64748b'}}>Hand wheel, lever, gear operated — gate, globe, ball, butterfly, check</div>
              <div style={{fontSize:11,color:'#475569',marginTop:6,...T.mono}}>ITR: M-01A – Valve and Penstock Installation</div>
            </button>
            <button onClick={()=>goToDetails('actuated')}
              style={{background:'#1e293b',border:'2px solid #334155',borderRadius:12,padding:'20px 22px',cursor:'pointer',textAlign:'left',width:'100%'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#F59E0B';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#334155';}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Actuated / Automated Valve</div>
              <div style={{fontSize:13,color:'#64748b'}}>Pneumatic, hydraulic or electric actuator, control valve, modulating valve</div>
              <div style={{fontSize:11,color:'#475569',marginTop:6,...T.mono}}>ITR: I-02A – Control Valve Installation</div>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── VALVE DETAILS CONFIRMATION ────────────
  if(screen==='valve-details'&&selValve) return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="Confirm Valve Details" onBack={()=>setScreen('valve-type')} step={5} total={7}
        sub="Edit if different from as-installed"/>
      <div style={{maxWidth:520,margin:'0 auto',padding:'32px 24px'}}>

        {/* Valve identity card */}
        <div style={{background:'#0c2340',border:'1.5px solid #1d4ed8',borderRadius:10,padding:'14px 18px',marginBottom:24}}>
          <div style={{...T.mono,fontSize:15,color:'#93c5fd'}}>{selValve.tag}</div>
          <div style={{fontSize:13,color:'#7dd3fc',marginTop:3}}>{selValve.type}{selValve.size?` — ${selValve.size}`:''} · {selValve.pid}</div>
          <div style={{fontSize:11,color:'#475569',marginTop:3}}>{selValve.location}</div>
        </div>

        <div style={{fontSize:13,color:'#64748b',marginBottom:20,lineHeight:1.5}}>
          Details are pre-filled from the valve schedule. Update any field that differs from the valve as installed.
        </div>

        {/* Make */}
        <div style={{marginBottom:18}}>
          <label style={T.label}>Manufacturer / Make</label>
          <input value={valveDetails.make}
            onChange={e=>setValveDetails(p=>({...p,make:e.target.value}))}
            placeholder="e.g. Velan"
            style={{...T.input,fontSize:15,padding:'13px 14px'}}/>
        </div>

        {/* Model */}
        <div style={{marginBottom:18}}>
          <label style={T.label}>Model</label>
          <input value={valveDetails.model}
            onChange={e=>setValveDetails(p=>({...p,model:e.target.value}))}
            placeholder="e.g. F-Series XL"
            style={{...T.input,fontSize:15,padding:'13px 14px'}}/>
        </div>

        {/* Serial No */}
        <div style={{marginBottom:28}}>
          <label style={T.label}>Serial Number</label>
          <input value={valveDetails.serialNo}
            onChange={e=>setValveDetails(p=>({...p,serialNo:e.target.value}))}
            placeholder="e.g. SN-2024-00842"
            style={{...T.input,fontSize:15,padding:'13px 14px'}}/>
          {!valveDetails.serialNo&&(
            <div style={{fontSize:11,color:'#475569',marginTop:6}}>Serial number may be found on the valve nameplate</div>
          )}
        </div>

        <button onClick={()=>setScreen('itr')}
          style={{...T.btnP,width:'100%',fontSize:16,padding:'15px',borderRadius:10}}>
          Continue to Checklist →
        </button>
      </div>
    </div>
  );

  // ── ITR CHECKLIST ─────────────────────────
  if(screen==='itr'&&selValve) return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="Inspection Checklist" onBack={()=>setScreen('valve-details')} step={6} total={7}
        sub={valveType==='actuated'?'I-02A – Control Valve Installation':'M-01A – Valve and Penstock Installation'}/>
      <div style={{maxWidth:780,margin:'0 auto',padding:'0 20px 32px'}}>

        {/* Valve info banner */}
        <div style={{background:'#0c2340',border:'1.5px solid #1d4ed8',borderRadius:10,padding:'14px 18px',margin:'16px 0'}}>
          <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
            <div style={{minWidth:160}}>
              <div style={{...T.mono,fontSize:15,fontWeight:500,color:'#93c5fd',wordBreak:'break-all'}}>{selValve.tag}</div>
              <div style={{fontSize:11,color:'#60a5fa',marginTop:2}}>{selValve.pid}</div>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontSize:13,color:'#e0f2fe',fontWeight:600}}>{selValve.type}{selValve.size?` — ${selValve.size}`:''}</div>
              {valveDetails.make&&<div style={{fontSize:12,color:'#7dd3fc',marginTop:2}}>{valveDetails.make}{valveDetails.model?` · ${valveDetails.model}`:''}</div>}
              {valveDetails.serialNo&&<div style={{fontSize:11,color:'#475569',marginTop:1}}>S/N: {valveDetails.serialNo}</div>}
              <div style={{fontSize:11,color:'#334155',marginTop:3}}>{selValve.location}</div>
            </div>
          </div>
        </div>

        {/* Progress row */}
        <div style={{display:'flex',alignItems:'center',gap:12,margin:'14px 0'}}>
          <div style={{flex:1}}><ProgressBar value={progress}/></div>
          <div style={{...T.mono,fontSize:13,color:'#94a3b8',minWidth:48}}>{doneItems}/{totalItems}</div>
        </div>

        {/* Checklist by category */}
        {cats.map(cat=>{
          const catItems = activeChecklist.filter(i=>i.cat===cat);
          const allOK    = catItems.length>0 && catItems.every(i=>answers[i.id]?.status==='ok');
          const someOK   = !allOK && catItems.some(i=>answers[i.id]?.status==='ok');
          return (
            <div key={cat} style={{marginBottom:16}}>
              {/* Section header + select-all */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',background:'#1e293b',borderRadius:6,marginBottom:4}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:'#F59E0B',letterSpacing:1.5,textTransform:'uppercase'}}>{cat}</span>
                <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
                  <input type="checkbox" checked={allOK}
                    ref={el=>{ if(el) el.indeterminate = someOK; }}
                    onChange={e=>catItems.forEach(i=>setStatus(i.id, e.target.checked?'ok':null))}
                    style={{width:15,height:15,cursor:'pointer',accentColor:'#16a34a'}}/>
                  <span style={{fontSize:11,color:'#64748b',fontWeight:600}}>ALL OK</span>
                </label>
              </div>

              {/* Items */}
              {catItems.map((item,n)=>{
                const ans = answers[item.id]||{};
                const bordColor = ans.status==='ok'?'#16a34a':ans.status==='sl'?'#b45309':ans.status==='na'?'#475569':'#1e293b';
                const showComment = item.hasNote || expandedNotes[item.id] || !!ans.note;
                return (
                  <div key={item.id} style={{background:'#131f2e',borderRadius:5,padding:'8px 10px',marginBottom:3,borderLeft:`3px solid ${bordColor}`,transition:'border-color 0.2s'}}>
                    {/* Text row */}
                    <div style={{display:'flex',gap:8,marginBottom:6}}>
                      <span style={{...T.mono,fontSize:10,color:'#475569',minWidth:18,paddingTop:2,flexShrink:0}}>{n+1}.</span>
                      <span style={{fontSize:12,color:'#cbd5e1',lineHeight:1.4,flex:1}}>{item.text}</span>
                    </div>
                    {/* Status + comment button row */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingLeft:26}}>
                      <div style={{display:'flex',gap:5}}>
                        {['ok','na','sl'].map(s=>(
                          <StatusBtn key={s} current={ans.status} status={s} onClick={()=>setStatus(item.id,s)}/>
                        ))}
                      </div>
                      {!showComment&&(
                        <button onClick={()=>toggleNote(item.id)}
                          style={{background:'transparent',border:'none',color:'#334155',cursor:'pointer',fontSize:15,padding:'2px 4px',lineHeight:1}}
                          title="Add comment">💬</button>
                      )}
                    </div>
                    {/* Comment field */}
                    {showComment&&(
                      <div style={{marginTop:6,paddingLeft:26}}>
                        <input type="text" value={ans.note||''} onChange={e=>setNote(item.id,e.target.value)}
                          placeholder={item.hasNote?'Note / measurement…':'Comment…'}
                          style={{...T.input,fontSize:12,padding:'6px 10px',background:'#0f172a',borderColor:'#334155'}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}

        {/* Test Equipment — shown for actuated valves */}
        {valveType==='actuated'&&(
          <div style={{marginBottom:20}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',background:'#1e293b',borderRadius:6,marginBottom:4}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:'#F59E0B',letterSpacing:1.5,textTransform:'uppercase'}}>Test Equipment</span>
              <span style={{fontSize:11,color:'#64748b'}}>Optional — enter test instrument details</span>
            </div>
            <div style={{background:'#131f2e',borderRadius:5,padding:'12px 14px',borderLeft:'3px solid #334155'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[
                  {label:'Make',       key:'make',      placeholder:'e.g. Fluke'},
                  {label:'Model',      key:'model',     placeholder:'e.g. 1587FC'},
                  {label:'Serial No',  key:'serialNo',  placeholder:'e.g. SN-123456'},
                  {label:'Cal Expiry', key:'calExpiry', placeholder:'e.g. 31/12/2025'},
                ].map(f=>(
                  <div key={f.key}>
                    <div style={{fontSize:10,color:'#64748b',fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{f.label}</div>
                    <input type="text" value={testEquip[f.key]} onChange={e=>setTestEquip(p=>({...p,[f.key]:e.target.value}))}
                      placeholder={f.placeholder}
                      style={{...T.input,fontSize:12,padding:'7px 10px',background:'#0f172a',borderColor:'#334155'}}/>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        <button onClick={()=>setScreen('signature')} disabled={!allDone}
          style={{...T.btnP,width:'100%',opacity:allDone?1:0.4,fontSize:16,padding:'16px',borderRadius:10,marginTop:8}}>
          {allDone?'All Items Complete — Sign Off →':`Complete ${totalItems-doneItems} remaining item${totalItems-doneItems!==1?'s':''} to continue`}
        </button>
      </div>
    </div>
  );

  // ── SIGNATURE ─────────────────────────────
  if(screen==='signature') return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="Inspector Sign-Off" onBack={()=>setScreen('itr')} step={7} total={7}/>
      <div style={{maxWidth:560,margin:'0 auto',padding:'32px 24px'}}>
        <div style={{...T.card,marginBottom:24}}>
          <div style={{display:'flex',gap:32,flexWrap:'wrap'}}>
            {[{l:'Inspector',v:userName},{l:'Company',v:userCompany},{l:'Date',v:fmtDate(itrDate)},{l:'Time',v:fmtTime(itrDate)}].map(r=>(
              <div key={r.l}><div style={T.label}>{r.l}</div><div style={{fontSize:15,color:'#f1f5f9'}}>{r.v}</div></div>
            ))}
          </div>
          <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid #334155'}}>
            <div style={{...T.label}}>Valve</div>
            <div style={{...T.mono,fontSize:18,color:'#F59E0B'}}>{selValve?.tag}</div>
            <div style={{fontSize:13,color:'#64748b'}}>{selValve?.type} {selValve?.size} — {selValve?.pid}</div>
          </div>
        </div>

        <div style={{...T.label,marginBottom:10}}>Signature <span style={{fontSize:11,color:'#475569',fontWeight:400,letterSpacing:0}}>(draw in white area)</span></div>
        <div style={{background:'#fff',borderRadius:10,border:'2px solid #334155',overflow:'hidden',cursor:'crosshair',touchAction:'none'}}>
          <canvas ref={canvasRef} width={520} height={180} style={{width:'100%',height:180,display:'block',touchAction:'none'}}
            onMouseDown={sigStart} onMouseMove={sigMove} onMouseUp={sigEnd} onMouseLeave={sigEnd}
            onTouchStart={sigStart} onTouchMove={sigMove} onTouchEnd={sigEnd}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10,marginBottom:28}}>
          <button onClick={clearSig} style={{...T.btnG,fontSize:13}}>Clear</button>
          {sigData&&<span style={{fontSize:13,color:'#16a34a'}}>✓ Signature captured</span>}
        </div>

        <button onClick={()=>setScreen('preview')} disabled={!sigData}
          style={{...T.btnP,width:'100%',opacity:sigData?1:0.4,fontSize:16,padding:'16px',borderRadius:10}}>
          Review ITR & Submit →
        </button>
      </div>
    </div>
  );

  // ── PREVIEW ───────────────────────────────
  if(screen==='preview') return (
    <div style={{minHeight:'100vh',background:'#0f172a'}}>
      <Header title="ITR Review & Submit" onBack={()=>setScreen('signature')}/>
      <div style={{maxWidth:700,margin:'0 auto',padding:'24px 20px'}}>

        {/* Result banner */}
        <div style={{background:hasSL?'#451a03':'#052e16',border:`2px solid ${hasSL?'#b45309':'#16a34a'}`,borderRadius:12,padding:'20px 24px',marginBottom:20,display:'flex',gap:18,alignItems:'center'}}>
          <div style={{fontSize:40,lineHeight:1}}>{hasSL?'⚠️':'✅'}</div>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:700,color:hasSL?'#fcd34d':'#86efac'}}>
              {hasSL?'S/L ITEMS NOTED – FOLLOW-UP REQUIRED':'ACCEPTED'}
            </div>
            <div style={{fontSize:13,color:hasSL?'#f59e0b':'#4ade80',marginTop:4}}>
              {hasSL?`${slItems.length} item${slItems.length!==1?'s':''} marked S/L – surveillance or follow-up required`:'All inspection items accepted or confirmed N/A'}
            </div>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
          {[{l:'Total Items',v:totalItems,c:'#94a3b8'},
            {l:'OK / N/A',v:Object.values(answers).filter(a=>a&&(a.status==='ok'||a.status==='na')).length,c:'#16a34a'},
            {l:'S/L Items',v:slItems.length,c:slItems.length?'#b45309':'#334155'}].map(m=>(
            <div key={m.l} style={{background:'#1e293b',borderRadius:8,padding:'16px',textAlign:'center'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:38,fontWeight:700,color:m.c}}>{m.v}</div>
              <div style={{fontSize:12,color:'#64748b'}}>{m.l}</div>
            </div>
          ))}
        </div>

        {/* Valve + Inspector */}
        <div style={{...T.card,marginBottom:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:16}}>
            <div><div style={T.label}>Valve Tag</div><div style={{...T.mono,fontSize:22,color:'#F59E0B'}}>{selValve?.tag}</div></div>
            <div><div style={T.label}>P&ID Reference</div><div style={{fontSize:15,color:'#f1f5f9'}}>{selValve?.pid}</div></div>
            <div><div style={T.label}>Type & Size</div><div style={{fontSize:14,color:'#f1f5f9'}}>{selValve?.type} {selValve?.size} {selValve?.rating}</div></div>
            <div><div style={T.label}>Location</div><div style={{fontSize:13,color:'#94a3b8'}}>{selValve?.location}</div></div>
          </div>
          <div style={{paddingTop:16,borderTop:'1px solid #334155',display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start'}}>
            <div><div style={T.label}>Inspector</div><div style={{fontSize:15,color:'#f1f5f9'}}>{userName}</div><div style={{fontSize:12,color:'#64748b'}}>{userCompany}</div></div>
            <div><div style={T.label}>Date & Time</div><div style={{fontSize:15,color:'#f1f5f9'}}>{fmtDate(itrDate)}</div><div style={{fontSize:12,color:'#64748b'}}>{fmtTime(itrDate)}</div></div>
            {sigData&&<div><div style={T.label}>Signature</div><img src={sigData} alt="sig" style={{height:52,background:'#fff',borderRadius:4,padding:'3px 6px'}}/></div>}
          </div>
        </div>

        {/* S/L items */}
        {slItems.length>0&&(
          <div style={{background:'#1c0a00',border:'1.5px solid #92400e',borderRadius:10,padding:'16px 20px',marginBottom:20}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:'#fcd34d',marginBottom:12,letterSpacing:1}}>S/L ITEMS — SURVEILLANCE / FOLLOW-UP REQUIRED</div>
            {slItems.map((item,n)=>(
              <div key={item.id} style={{padding:'8px 0',borderTop:n>0?'1px solid #451a03':'none'}}>
                <div style={{fontSize:13,color:'#fde68a'}}>{item.text}</div>
                {answers[item.id]?.note&&<div style={{fontSize:12,color:'#f59e0b',marginTop:3}}>Note: {answers[item.id].note}</div>}
              </div>
            ))}
          </div>
        )}

        {/* Actions */}
        {generating&&(
          <div style={{background:'#1e293b',borderRadius:10,padding:'16px 20px',marginBottom:12,textAlign:'center',fontSize:14,color:'#F59E0B'}}>
            ⏳ Generating PDF — this takes a few seconds…
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:4}}>
          <button onClick={viewITR} disabled={generating}
            style={{...T.btnS,padding:'16px',fontSize:15,borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',gap:6,opacity:generating?0.4:1}}>
            <span style={{fontSize:24}}>📄</span>
            <span style={{fontWeight:700}}>{generating?'Generating…':'View ITR'}</span>
            <span style={{fontSize:11,opacity:0.7,fontWeight:400}}>Opens as PDF</span>
          </button>
          <button onClick={sendITR} disabled={generating}
            style={{...T.btnP,padding:'16px',fontSize:15,borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',gap:6,opacity:generating?0.4:1}}>
            <span style={{fontSize:24}}>📧</span>
            <span style={{fontWeight:700}}>{generating?'Generating…':'Email Report'}</span>
            <span style={{fontSize:11,opacity:0.7,fontWeight:400}}>Attach PDF to email</span>
          </button>
        </div>
        <div style={{fontSize:12,color:'#334155',marginTop:10,textAlign:'center'}}>
          On mobile: Email Report opens your device's share sheet with the PDF attached.<br/>
          On desktop: the PDF downloads automatically — attach it to the email that opens.
        </div>
      </div>
    </div>
  );

  // ── COMPLETE ──────────────────────────────
  if(screen==='complete') return (
    <div style={{minHeight:'100vh',background:'#0f172a',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:20}}>✅</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:44,fontWeight:800,color:'#f1f5f9',marginBottom:8,letterSpacing:0.5}}>ITR COMPLETE</div>
      <div style={{fontSize:16,color:'#64748b',marginBottom:6}}>{selValve?.tag} — {selValve?.type} {selValve?.size}</div>
      <div style={{fontSize:13,color:'#475569',marginBottom:8}}>{selValve?.pid} · {selValve?.location}</div>
      <div style={{fontSize:13,color:'#334155',marginBottom:36}}>{fmtDate(itrDate)} {fmtTime(itrDate)} · {userName} · {userCompany}</div>
      <div style={{background:hasSL?'#451a03':'#052e16',border:`1.5px solid ${hasSL?'#b45309':'#16a34a'}`,borderRadius:8,padding:'12px 28px',marginBottom:scriptUrl?16:36}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:hasSL?'#fcd34d':'#86efac'}}>{hasSL?'S/L ITEMS – FOLLOW-UP REQUIRED':'ACCEPTED'}</div>
      </div>
      {scriptUrl&&(
        <div style={{marginBottom:28,padding:'10px 20px',borderRadius:8,fontSize:13,
          background:submitted?'#052e16':submitErr?'#450a0a':'#1e293b',
          border:`1px solid ${submitted?'#16a34a':submitErr?'#dc2626':'#334155'}`,
          color:submitted?'#86efac':submitErr?'#fca5a5':'#64748b'}}>
          {submitted?'✓ Record saved to Google Sheets':submitErr?`⚠ ${submitErr}`:'↑ Saving record to Google Sheets…'}
        </div>
      )}
      <div style={{display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
        <button onClick={viewITR} disabled={generating} style={{...T.btnS,opacity:generating?0.4:1}}>
          {generating?'⏳ Generating…':'📄 View PDF'}
        </button>
        <button onClick={()=>{setSelValve(null);setAnswers({});setSigData(null);setValveType('');setValveDetails({make:'',model:'',serialNo:''});setTestEquip({make:'',model:'',serialNo:'',calExpiry:''});setScreen('pid-select');}} style={{...T.btnP}}>Inspect Next Valve →</button>
        <button onClick={()=>setScreen('landing')} style={{...T.btnG}}>Home</button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
